name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run Python tests
        id: run_tests
        continue-on-error: true
        run: python -m pytest -v | tee pytest_output.txt

      - name: Run Go tests
        id: run_go_tests
        continue-on-error: true
        run: go test ./... -v | tee go_output.txt

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform init
        working-directory: infra
        run: terraform init -input=false

      - name: Terraform fmt check
        id: tf_fmt
        working-directory: infra
        continue-on-error: true
        run: terraform fmt -check -recursive -diff -no-color | tee fmt_output.txt

      - name: Terraform validate
        id: tf_validate
        working-directory: infra
        continue-on-error: true
        run: terraform validate -no-color | tee validate_output.txt

      - name: Update CI dashboard log
        if: always() && github.event_name == 'push'
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          SHORT_SHA=$(git rev-parse --short HEAD)

          PY_SUMMARY=$(tail -n 1 pytest_output.txt | sed 's/=//g' | xargs)
          if [ "${{ steps.run_tests.outcome }}" = "success" ]; then
            PY_STATUS="Passed"
          else
            PY_STATUS="Failed"
          fi
          echo "| $TIMESTAMP | \`$SHORT_SHA\` | ${{ github.ref_name }} | Python | $PY_STATUS | $PY_SUMMARY |" >> DASHBOARD.md

          GO_PASS_COUNT=$(grep -c '^--- PASS' go_output.txt | xargs)
          GO_FAIL_COUNT=$(grep -c '^--- FAIL' go_output.txt | xargs)
          GO_TOTAL_TIME=$(grep -oE -- '-?[0-9]+\.[0-9]+s\)' go_output.txt | tr -d 's)' | awk '{sum+=$1} END {printf "%.2f", sum}')

          if [ "$GO_PASS_COUNT" = "0" ] && [ "$GO_FAIL_COUNT" = "0" ]; then
            GO_SUMMARY="no go tests reported"
          elif [ "$GO_FAIL_COUNT" != "0" ]; then
            GO_SUMMARY="$GO_FAIL_COUNT failed, $GO_PASS_COUNT passed in ${GO_TOTAL_TIME}s"
          else
            GO_SUMMARY="$GO_PASS_COUNT passed in ${GO_TOTAL_TIME}s"
          fi
          if [ "${{ steps.run_go_tests.outcome }}" = "success" ]; then
            GO_STATUS="Passed"
          else
            GO_STATUS="Failed"
          fi
          echo "| $TIMESTAMP | \`$SHORT_SHA\` | ${{ github.ref_name }} | Go | $GO_STATUS | $GO_SUMMARY |" >> DASHBOARD.md

          TF_FMT_OUTCOME="${{ steps.tf_fmt.outcome }}"
          TF_VALIDATE_OUTCOME="${{ steps.tf_validate.outcome }}"

          if [ "$TF_FMT_OUTCOME" = "success" ] && [ "$TF_VALIDATE_OUTCOME" = "success" ]; then
            TF_STATUS="Passed"
          else
            TF_STATUS="Failed"
          fi
          TF_SUMMARY="fmt: $TF_FMT_OUTCOME, validate: $TF_VALIDATE_OUTCOME, plan: run manually (see README)"
          echo "| $TIMESTAMP | \`$SHORT_SHA\` | ${{ github.ref_name }} | Terraform | $TF_STATUS | $TF_SUMMARY |" >> DASHBOARD.md

          {
            echo "# Terraform Report"
            echo
            echo "Automated report from the CI workflow ([.github/workflows/ci.yml](../.github/workflows/ci.yml))."
            echo "Regenerated on every push — this file always reflects the latest run only (not appended)."
            echo
            echo "_Last updated: $TIMESTAMP — commit \`$SHORT_SHA\` on \`${{ github.ref_name }}\`_"
            echo
            echo "| Check | Result |"
            echo "|---|---|"
            echo "| \`terraform fmt -check\` | $TF_FMT_OUTCOME |"
            echo "| \`terraform validate\` | $TF_VALIDATE_OUTCOME |"
            echo "| \`terraform plan\` / \`terraform apply\` | not run in CI — no AWS credentials configured; run locally (see README) |"
            echo
            echo "## terraform fmt -check output"
            echo
            echo '```'
            cat infra/fmt_output.txt 2>/dev/null || echo "(no output captured)"
            echo '```'
            echo
            echo "## terraform validate output"
            echo
            echo '```'
            cat infra/validate_output.txt 2>/dev/null || echo "(no output captured)"
            echo '```'
          } > infra/TERRAFORM_REPORT.md

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add DASHBOARD.md infra/TERRAFORM_REPORT.md
          if ! git diff --cached --quiet; then
            git commit -m "Update CI dashboard log [skip ci]"
            git push origin HEAD:${{ github.ref }}
          fi

      - name: Fail job if tests failed
        if: steps.run_tests.outcome == 'failure' || steps.run_go_tests.outcome == 'failure' || steps.tf_fmt.outcome == 'failure' || steps.tf_validate.outcome == 'failure'
        run: exit 1
