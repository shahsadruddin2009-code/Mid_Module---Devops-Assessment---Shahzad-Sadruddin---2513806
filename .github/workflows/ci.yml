name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        id: run_tests
        continue-on-error: true
        run: python -m pytest -v | tee pytest_output.txt

      - name: Update CI dashboard log
        if: always() && github.event_name == 'push'
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          SHORT_SHA=$(git rev-parse --short HEAD)
          SUMMARY=$(tail -n 1 pytest_output.txt | sed 's/=//g' | xargs)
          if [ "${{ steps.run_tests.outcome }}" = "success" ]; then
            STATUS="Passed"
          else
            STATUS="Failed"
          fi
          echo "| $TIMESTAMP | \`$SHORT_SHA\` | ${{ github.ref_name }} | $STATUS | $SUMMARY |" >> DASHBOARD.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add DASHBOARD.md
          if ! git diff --cached --quiet; then
            git commit -m "Update CI dashboard log [skip ci]"
            git push origin HEAD:${{ github.ref }}
          fi

      - name: Fail job if tests failed
        if: steps.run_tests.outcome == 'failure'
        run: exit 1
